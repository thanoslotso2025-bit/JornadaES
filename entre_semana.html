<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entre Semana - Next Level 7</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0a;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  font-family: 'Bebas Neue', sans-serif;
}
.editor-panel {
  background: rgba(0,0,0,0.88);
  border: 1px solid #3a6b1a;
  border-radius: 12px;
  padding: 18px 22px;
  margin-bottom: 22px;
  width: 100%;
  max-width: 860px;
}
.editor-panel h3 {
  color: #b8f030;
  font-size: 17px;
  letter-spacing: 3px;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.controls-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
  align-items: end;
}
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-group label {
  color: #88aa44;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.field-group input, .field-group select {
  background: rgba(255,255,255,0.07);
  border: 1px solid #3a6b1a;
  border-radius: 6px;
  color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 1px;
  padding: 6px 10px;
  outline: none;
}
.field-group select option { background: #111; color: #fff; }
.load-btn {
  background: linear-gradient(135deg, #3a6b1a, #7ddf00);
  border: none;
  border-radius: 8px;
  color: #fff;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 3px;
  padding: 10px 16px;
  text-transform: uppercase;
  width: 100%;
}
.status-msg {
  color: #88cc22;
  font-size: 13px;
  letter-spacing: 2px;
  margin-top: 8px;
  min-height: 20px;
  text-align: center;
}
.dl-btn {
  background: linear-gradient(135deg, #7ddf00, #d4f030);
  border: none;
  border-radius: 8px;
  color: #000;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  letter-spacing: 3px;
  padding: 12px 20px;
  text-transform: uppercase;
  width: 100%;
  margin-top: 10px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  body { padding: 10px; }

  .editor-panel { max-width: 100%; padding: 14px; }

  .controls-row {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .flyer-wrapper {
    width: 100%;
    height: 0;
    padding-bottom: 140.7%;
    aspect-ratio: unset;
  }

  .flyer-bg { object-position: center top; }

  .liga-banner { top: 22%; width: 95%; }
  .jornada-title { font-size: 20px; letter-spacing: 3px; }

  .encounters-container {
    top: 28%;
    bottom: auto;
    width: 95%;
    gap: 10px;
  }

  .team-logo-box { width: 60px; height: 80px; }
  .team-col { gap: 6px; width: 38%; }
  .team-name-flyer { font-size: 13px; letter-spacing: 1px; }
  .enc-hora-label { font-size: 9px; }

  .vs-col { width: 24%; }
  .vs-text { font-size: 36px; }
  .vs-hora { font-size: 11px; letter-spacing: 1px; }
  .cancha-vs { font-size: 9px; }
  .goles-num { font-size: 36px; padding: 0 4px; }
  .penales-badge { font-size: 9px; }
  .enc-divider { margin: 2px 0; }

  .footer-info {
    bottom: 18%;
    left: 10px;
    right: 10px;
  }
  .footer-label { font-size: 14px; letter-spacing: 2px; }
  .footer-value { font-size: 20px; letter-spacing: 2px; }
  .footer-value.green { font-size: 18px; }
}

@media (max-width: 480px) {
  .controls-row { grid-template-columns: 1fr; }
  .team-logo-box { width: 45px; height: 60px; }
  .team-name-flyer { font-size: 11px; }
  .vs-text { font-size: 28px; }
  .goles-num { font-size: 28px; }
  .jornada-title { font-size: 16px; }
  .footer-label { font-size: 12px; }
  .footer-value { font-size: 16px; }
}

/* ===== FLYER ===== */
.flyer-wrapper {
  position: relative;
  width: 860px;
  max-width: 100%;
  height: 1210px;
  overflow: hidden;
  border-radius: 8px;
  box-shadow: 0 0 60px rgba(0,0,0,0.95);
}
.flyer-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  z-index: 0;
}
.overlay-main {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom,
    rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.05) 20%,
    rgba(0,0,0,0.65) 30%, rgba(0,0,0,0.70) 80%,
    rgba(0,0,0,0.10) 100%);
  z-index: 1;
}
.liga-banner {
  position: absolute;
  top: 265px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  width: 800px;
  text-align: center;
}
.jornada-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px;
  letter-spacing: 6px;
  color: #c8f020;
  text-shadow: 0 0 20px rgba(100,200,0,0.4), 0 2px 8px rgba(0,0,0,0.95);
  text-transform: uppercase;
}
.encounters-container {
  position: absolute;
  top: 310px;
  left: 50%;
  transform: translateX(-50%);
  width: 820px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.enc-flyer-row {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}
.team-col {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 12px;
  width: 340px;
}
.team-col.right { flex-direction: row-reverse; }
.team-logo-box {
  width: 100px;
  height: 135px;
  flex-shrink: 0;
  border-radius: 8px;
  overflow: hidden;
  background: rgba(0,0,0,0.60);
  box-shadow: 0 0 20px rgba(0,0,0,0.8), 0 0 0 1.5px rgba(184,240,48,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
}
.team-logo-box img { width:100%; height:100%; object-fit:cover; display:block; }
.team-info { flex:1; display:flex; flex-direction:column; gap:4px; }
.team-col.right .team-info { text-align:right; }
.team-name-flyer {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  color: #fff;
  text-transform: uppercase;
  text-shadow: 0 2px 8px rgba(0,0,0,1);
  line-height: 1.1;
}
.enc-hora-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  color: #88cc22;
  text-transform: uppercase;
}
.vs-col {
  width: 140px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
}
.vs-goles-row {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 14px;
}
.vs-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 62px;
  line-height: 1;
  color: #d4f030;
  text-shadow: 0 0 18px rgba(120,220,0,0.6), 0 3px 8px rgba(0,0,0,0.95);
  letter-spacing: 2px;
}
.vs-hora {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 3px;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.9);
  text-transform: uppercase;
}
.penales-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 3px;
  color: #ffb400;
  text-shadow: 0 0 10px rgba(255,180,0,0.6);
  text-transform: uppercase;
  text-align: center;
}
.cancha-vs {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 2px;
  color: #88cc22;
  text-align: center;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  margin-bottom: 2px;
}
.enc-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(to right, transparent, rgba(184,240,48,0.25), transparent);
}
.goles-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 58px;
  color: #d4f030;
  text-shadow: 0 0 14px rgba(120,220,0,0.6), 0 2px 6px rgba(0,0,0,0.9);
  letter-spacing: 2px;
  flex-shrink: 0;
  line-height: 1;
  padding: 0 10px;
}
.footer-info {
  position: absolute;
  bottom: 210px;
  left: 22px;
  right: 22px;
  z-index: 10;
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  justify-content: space-between;
}
.footer-left {
  display: flex;
  flex-direction: row;
  align-items: flex-end;
  gap: 32px;
}
.footer-item {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
}
.footer-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 4px;
  color: #88cc22;
  text-transform: uppercase;
  text-shadow: 0 1px 6px rgba(0,0,0,0.9);
}
.footer-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  letter-spacing: 4px;
  color: #fff;
  text-shadow: 0 2px 14px rgba(0,0,0,0.95);
  text-transform: uppercase;
}
.footer-value.green {
  color: #c8f020;
  text-shadow: 0 0 16px rgba(100,200,0,0.4), 0 2px 10px rgba(0,0,0,0.95);
  font-size: 38px;
}
@media print {
  .editor-panel { display: none !important; }
  body { background: #000; padding: 0; }
  .flyer-wrapper { box-shadow: none; border-radius: 0; }
}
</style>
</head>
<body>

<div class="editor-panel">
  <h3>⚽ Entre Semana — Next Level 7</h3>
  <div class="controls-row">
    <div class="field-group">
      <label>Filtrar por</label>
      <select id="filterTipo" onchange="cambiarFiltro()">
        <option value="jornada">Por Jornada</option>
        <option value="fecha">Por Fecha</option>
      </select>
    </div>
    <div class="field-group" id="groupJornada">
      <label>Jornada</label>
      <select id="filterJornada">
        <option value="">— Selecciona —</option>
        <option value="1">Jornada 1</option>
        <option value="2">Jornada 2</option>
        <option value="3">Jornada 3</option>
        <option value="4">Jornada 4</option>
        <option value="5">Jornada 5</option>
        <option value="6">Jornada 6</option>
        <option value="7">Jornada 7</option>
        <option value="8">Jornada 8</option>
      </select>
    </div>
    <div class="field-group" id="groupFecha" style="display:none">
      <label>Fecha</label>
      <select id="filterFecha">
        <option value="">— Cargando... —</option>
      </select>
    </div>
    <div class="field-group">
      <label>Cancha</label>
      <input type="text" id="canchaInput" value="NEXT LEVEL 7" oninput="updateCancha()">
    </div>
    <div class="field-group">
      <label>&nbsp;</label>
      <button class="load-btn" onclick="cargarDatos()">🔄 Cargar Datos</button>
    </div>
  </div>
  <div class="status-msg" id="statusMsg">Selecciona jornada o fecha y presiona Cargar Datos</div>
  <button class="dl-btn" onclick="downloadPNG()" id="dlBtn">⬇ Descargar Flyer como PNG</button>
</div>

<!-- FLYER -->
<div class="flyer-wrapper" id="flyerRoot">
  <img class="flyer-bg" id="flyerBg" src="" alt="bg">
  <div class="overlay-main"></div>
  <div class="liga-banner">
    <div class="jornada-title" id="jornadaDisplay">ENTRE SEMANA</div>
  </div>
  <div class="encounters-container" id="encFlyer">
    <div style="text-align:center;color:rgba(255,255,255,0.3);font-size:22px;letter-spacing:4px;margin-top:60px;">
      CARGA LOS DATOS PARA VER LOS PARTIDOS
    </div>
  </div>
  <div class="footer-info">
    <div class="footer-left">
      <div class="footer-item">
        <div class="footer-label">📅 Fecha</div>
        <div class="footer-value" id="fechaDisplay">—</div>
      </div>
      <div class="footer-item">
        <div class="footer-label">🏆 Torneo</div>
        <div class="footer-value green" id="torneoDisplay">TORNEO INTER-SEMANAL</div>
      </div>
    </div>
    <div class="footer-item" style="align-items:flex-start;">
      <div class="footer-label">📍 Cancha</div>
      <div class="footer-value green" id="canchaDisplay">NEXT LEVEL 7</div>
    </div>
  </div>
</div>

const CSV_PARTIDOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe8o5vSAnuzFZExIO0PyImPDji3vwZISBQTmj-aedEW5oPkaQ-T7tKxfcW8Pa69EeIW4_rdC5dQws7/pub?gid=1362473459&single=true&output=csv';
const CSV_EQUIPOS  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSe8o5vSAnuzFZExIO0PyImPDji3vwZISBQTmj-aedEW5oPkaQ-T7tKxfcW8Pa69EeIW4_rdC5dQws7/pub?gid=1894947293&single=true&output=csv';

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let ch of line) {
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { vals.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    vals.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i] || '').replace(/^"|"$/g,''));
    return obj;
  });
}

function formatHora(t) {
  if (!t) return '';
  const parts = t.split(':');
  let h = parseInt(parts[0]);
  const m = parts[1] || '00';
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return `${h}:${m} ${ampm}`;
}

function driveURL(url) {
  if (!url) return null;
  const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
  if (url.startsWith('http')) return url;
  return null;
}

function phSVG() {
  return `<svg style="width:42px;height:42px;opacity:0.22;" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="22" r="12" fill="white" opacity="0.4"/><path d="M10 54c0-11 9-18 20-18s20 7 20 18" fill="white" opacity="0.4"/></svg>`;
}

let todosPartidos = [];
let todosEquipos = [];

function cambiarFiltro() {
  const tipo = document.getElementById('filterTipo').value;
  document.getElementById('groupJornada').style.display = tipo === 'jornada' ? 'flex' : 'none';
  document.getElementById('groupFecha').style.display = tipo === 'fecha' ? 'flex' : 'none';
}

async function cargarFechas() {
  try {
    const [resP, resE] = await Promise.all([
      fetch(CSV_PARTIDOS),
      fetch(CSV_EQUIPOS)
    ]);
    todosPartidos = parseCSV(await resP.text());
    todosEquipos  = parseCSV(await resE.text());

    const fechas = [...new Set(
      todosPartidos
        .filter(p => p['Fecha'] && p['Fecha'].trim() !== '')
        .map(p => p['Fecha'].trim())
    )];

    const sel = document.getElementById('filterFecha');
    sel.innerHTML = '<option value="">— Selecciona una fecha —</option>';
    fechas.forEach(f => {
      sel.innerHTML += `<option value="${f}">${f}</option>`;
    });
    document.getElementById('statusMsg').textContent = 'Selecciona jornada o fecha y presiona Cargar Datos';

  } catch(e) {
    document.getElementById('statusMsg').textContent = '❌ Error: ' + e.message;
  }
}

async function cargarDatos() {
  const tipo = document.getElementById('filterTipo').value;
  const statusEl = document.getElementById('statusMsg');
  statusEl.textContent = '⏳ Cargando datos...';

  try {
    let filtrados = [];

    if (tipo === 'jornada') {
      const jornada = document.getElementById('filterJornada').value;
      if (!jornada) { statusEl.textContent = '⚠️ Selecciona una jornada'; return; }
      filtrados = todosPartidos.filter(p => String(p['Jornada']).trim() === String(jornada)).slice(0, 3);
      if (filtrados.length === 0) { statusEl.textContent = `⚠️ No hay partidos para Jornada ${jornada}`; return; }
      document.getElementById('jornadaDisplay').textContent = `ENTRE SEMANA — JORNADA ${jornada}`;
    } else {
      const fecha = document.getElementById('filterFecha').value;
      if (!fecha) { statusEl.textContent = '⚠️ Selecciona una fecha'; return; }
      filtrados = todosPartidos.filter(p => p['Fecha'].trim() === fecha).slice(0, 3);
      if (filtrados.length === 0) { statusEl.textContent = `⚠️ No hay partidos para el ${fecha}`; return; }
      document.getElementById('jornadaDisplay').textContent = `ENTRE SEMANA — ${fecha}`;
    }

    const eqMap = {};
    todosEquipos.forEach(e => { eqMap[String(e['ID_Equipo']).trim()] = e; });

    const cancha = filtrados[0]['Cancha'] || document.getElementById('canchaInput').value;
    document.getElementById('canchaDisplay').textContent = cancha.toUpperCase();
    document.getElementById('canchaInput').value = cancha;
    document.getElementById('fechaDisplay').textContent = filtrados[0]['Fecha'] || '—';

    const cont = document.getElementById('encFlyer');
    cont.innerHTML = '';

    filtrados.forEach((p, i) => {
      const eqL = eqMap[String(p['Equipo_Local']).trim()] || {};
      const eqV = eqMap[String(p['Equipo_Visita']).trim()] || {};
      const nomL = (eqL['Nombre'] || `Equipo ${p['Equipo_Local']}`).toUpperCase();
      const nomV = (eqV['Nombre'] || `Equipo ${p['Equipo_Visita']}`).toUpperCase();
      const hora  = formatHora(p['Hora']);
      const urlL  = driveURL(eqL['URL'] || '');
      const urlV  = driveURL(eqV['URL'] || '');
      const logoL = urlL ? `<img src="${urlL}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'">` : phSVG();
      const logoV = urlV ? `<img src="${urlV}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'">` : phSVG();
      const golesL = p['Goles_Local'] !== '' ? `<div class="goles-num">${p['Goles_Local']}</div>` : '';
      const golesV = p['Goles_Visita'] !== '' ? `<div class="goles-num">${p['Goles_Visita']}</div>` : '';
      const ganadoPor = (p['Ganado_Por'] || '').trim().toLowerCase();
      const penalesHTML = ganadoPor === 'penales' ? `<div class="penales-badge">⚽ PENALES</div>` : '';

      cont.innerHTML += `
      <div class="enc-flyer-row">
        <div class="team-col">
          <div class="team-logo-box">${logoL}</div>
          <div class="team-info">
            <div class="team-name-flyer">${nomL}</div>
            <div class="enc-hora-label">Local</div>
          </div>
        </div>
        <div class="vs-col">
          <div class="cancha-vs">${(p['Cancha'] || '').toUpperCase()}</div>
          <div class="vs-goles-row">
            ${golesL}
            <div class="vs-text">VS</div>
            ${golesV}
          </div>
          <div class="vs-hora">${hora}</div>
          ${penalesHTML}
        </div>
        <div class="team-col right">
          <div class="team-logo-box">${logoV}</div>
          <div class="team-info">
            <div class="team-name-flyer">${nomV}</div>
            <div class="enc-hora-label" style="text-align:right;">Visitante</div>
          </div>
        </div>
      </div>
      ${i < filtrados.length - 1 ? '<div class="enc-divider"></div>' : ''}`;
    });

    statusEl.textContent = `✅ ${filtrados.length} partido(s) cargado(s)`;

  } catch(e) {
    statusEl.textContent = '❌ Error: ' + e.message;
  }
}

function updateCancha() {
  document.getElementById('canchaDisplay').textContent =
    (document.getElementById('canchaInput').value || 'NEXT LEVEL 7').toUpperCase();
}

async function downloadPNG() {
  const btn = document.getElementById('dlBtn');
  const panel = document.querySelector('.editor-panel');

  panel.style.display = 'none';
  btn.textContent = '⏳ Generando...';
  btn.disabled = true;

  // Esperar que todas las imágenes carguen
  const imgs = document.getElementById('flyerRoot').querySelectorAll('img');
  await Promise.all(Array.from(imgs).map(img =>
    new Promise(resolve => {
      if (img.complete) resolve();
      else { img.onload = resolve; img.onerror = resolve; }
    })
  ));
  await new Promise(r => setTimeout(r, 800));

  try {
    const flyer = document.getElementById('flyerRoot');
    const canvas = await html2canvas(flyer, {
      useCORS: true,
      allowTaint: true,
      scale: 2,
      width: 860,
      height: 1210,
      backgroundColor: '#000000',
      imageTimeout: 20000,
      logging: false
    });

    canvas.toBlob((blob) => {
      if (blob) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'entre_semana.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      } else {
        const img = canvas.toDataURL('image/png');
        const w = window.open('');
        w.document.write(`<img src="${img}" style="max-width:100%"><br><a href="${img}" download="entre_semana.png">⬇ Haz clic aquí para guardar</a>`);
      }
    }, 'image/png');

  } catch(e) {
    alert('❌ Error al generar: ' + e.message);
  }

  panel.style.display = 'block';
  btn.textContent = '⬇ Descargar Flyer como PNG';
  btn.disabled = false;
}

// Escalar flyer en móvil
function escalarFlyer() {
  const wrapper = document.getElementById('flyerRoot');
  const containerWidth = wrapper.parentElement.offsetWidth;
  if (containerWidth < 860) {
    const scale = containerWidth / 860;
    wrapper.style.transform = `scale(${scale})`;
    wrapper.style.transformOrigin = 'top left';
    wrapper.style.marginBottom = `-${1210 * (1 - scale)}px`;
  } else {
    wrapper.style.transform = '';
    wrapper.style.marginBottom = '';
  }
}

window.addEventListener('resize', escalarFlyer);
window.addEventListener('load', escalarFlyer);
escalarFlyer();

// Cargar fechas al iniciar
cargarFechas();
</script>
